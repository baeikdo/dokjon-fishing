<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f766e"><link rel="manifest" href="manifest.json"><title>독존 낚시 일지</title>
<style>
body{margin:0;font-family:system-ui;background:#f3f7f6;color:#10201d}header{background:#0f766e;color:white;padding:18px 16px}h1{margin:0;font-size:22px}main{padding:12px 12px 80px}.card{background:white;border-radius:18px;padding:14px;margin-bottom:12px;border:1px solid #dbe7e5;box-shadow:0 3px 12px #0001}.ocr{background:#ecfeff;border-color:#a5f3fc}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{font-size:12px;font-weight:800;color:#64748b;display:block;margin-bottom:5px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #dbe7e5;border-radius:12px;padding:11px;font-size:15px}textarea{min-height:78px}.btn{border:0;border-radius:14px;padding:12px;font-weight:900;background:#0f766e;color:white}.light{background:#e6f4f1;color:#0f766e}.row{display:flex;gap:8px}.row>*{flex:1}.tab{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:white;border-top:1px solid #dbe7e5}.tab button{padding:13px 0;border:0;background:white}.tab .on{background:#e6f4f1;color:#0f766e;font-weight:900}.screen{display:none}.screen.on{display:block}.pill{display:inline-block;background:#e6f4f1;color:#0f766e;border-radius:99px;padding:5px 8px;margin:2px;font-size:12px;font-weight:800}.photo{width:100%;border-radius:12px;margin-top:8px}.meta{font-size:13px;line-height:1.5;color:#334155}.stat{display:flex;justify-content:space-between;border-bottom:1px dashed #dbe7e5;padding:9px 0}
#preview img{height:70px;border-radius:8px;border:1px solid #a5f3fc}</style></head><body><header><h1>🎣 독존 낚시 일지 v0.4</h1><p>예보와 실제 바다 비교 기록</p></header><main>
<section id="write" class="screen on">
<div class="card ocr"><b>📸 물때/날씨앱 캡처 자동입력</b><p class="meta">정자항·주전 물때, 바람/파고 캡처를 선택하고 자동입력을 누르세요.</p><input id="ocrImage" type="file" accept="image/*" multiple><div id="preview" style="display:flex;gap:6px;overflow-x:auto;margin-top:8px"></div><div class="row" style="margin-top:8px"><button class="btn" onclick="runOcr()">여러 사진 읽고 자동입력</button><button class="btn light" onclick="ocrText.style.display='block'">읽은 글자</button></div><div id="ocrStatus" class="meta" style="margin-top:8px"></div><textarea id="ocrText" style="display:none;margin-top:8px"></textarea></div>
<form id="form" class="card"><input type="hidden" id="editId"><div class="grid">
<div><label>날짜</label><input id="date" type="date"></div><div><label>물때</label><select id="tide"><option value="">선택</option></select></div>
<div><label>출항시간</label><input id="startTime" type="time"></div><div><label>철수시간</label><input id="endTime" type="time"></div>
<div><label>포인트</label><input id="point" list="points" placeholder="이득등대 앞"></div><div><label>수심</label><input id="depth" placeholder="18m"></div>
<div><label>날씨</label><input id="weather" placeholder="흐림"></div><div><label>바람</label><input id="wind" placeholder="남서 1.4m/s"></div>
<div><label>파고</label><input id="wave" placeholder="0.8m"></div><div><label>물색</label><input id="waterColor" placeholder="맑음/탁함"></div>
<div><label>어종</label><input id="fish" list="fishs" placeholder="농어"></div><div><label>크기</label><input id="size" placeholder="68cm"></div>
<div><label>마릿수</label><input id="count" type="number" min="0" value="0"></div><div><label>입질시간</label><input id="biteTime" type="time"></div>
<div><label>루어 종류</label><input id="lureType" list="lures" placeholder="메탈"></div><div><label>루어 무게</label><input id="lureWeight" placeholder="80g"></div>
<div><label>루어 색상</label><input id="lureColor" placeholder="블루"></div><div><label>베이트 유무</label><select id="bait"><option value="">선택</option><option>있음</option><option>없음</option><option>모름</option></select></div>
<div><label>갈매기/보일링</label><select id="boiling"><option value="">선택</option><option>갈매기 있음</option><option>보일링 있음</option><option>둘 다 있음</option><option>없음</option></select></div><div><label>사진</label><input id="photo" type="file" accept="image/*" capture="environment"></div>
<div class="full" style="background:#f8fafc;border:1px solid #dbe7e5;border-radius:14px;padding:10px;margin-top:4px"><b>🌊 현장 실제 바다 상황</b></div>
<div><label>실제 바람</label><select id="actualWind"><option value="">선택</option><option>예보보다 약함</option><option>예보와 비슷</option><option>예보보다 강함</option><option>돌풍 있음</option></select></div>
<div><label>실제 파도</label><select id="actualWave"><option value="">선택</option><option>잔잔</option><option>보통</option><option>높음</option><option>너울 심함</option></select></div>
<div><label>실제 조류</label><select id="actualCurrent"><option value="">선택</option><option>거의 안 감</option><option>약함</option><option>적당</option><option>빠름</option><option>매우 빠름</option></select></div>
<div><label>예보 대비 조류</label><select id="currentGap"><option value="">선택</option><option>예보보다 약함</option><option>예보와 비슷</option><option>예보보다 빠름</option><option>예보와 완전 다름</option></select></div>
<div><label>너울</label><select id="swell"><option value="">선택</option><option>없음</option><option>약간 있음</option><option>있음</option><option>심함</option></select></div>
<div><label>베이트</label><select id="baitSeen"><option value="">선택</option><option>없음</option><option>조금</option><option>많음</option><option>수면에 뜀</option></select></div>
<div><label>새 활동</label><select id="birdActivity"><option value="">선택</option><option>없음</option><option>조금</option><option>많음</option><option>갈매기 집중</option></select></div>
<div><label>낚시 편함</label><select id="comfortScore"><option value="">선택</option><option>1 매우 불편</option><option>2 불편</option><option>3 보통</option><option>4 좋음</option><option>5 아주 좋음</option></select></div>
<div class="full"><label>예보와 실제 차이 메모</label><textarea id="forecastGapMemo" placeholder="예: 예보 파고 0.4m였지만 실제 너울이 있어 0.8m처럼 느껴짐. 조류는 예보보다 빠름."></textarea></div><div class="full"><label>메모</label><textarea id="memo"></textarea></div></div><div class="row" style="margin-top:12px"><button class="btn">🎣 저장</button><button type="button" class="btn light" onclick="resetForm()">새 기록</button></div></form></section>
<section id="list" class="screen"><div class="card"><div class="grid"><input id="sFish" placeholder="어종"><input id="sPoint" placeholder="포인트"><select id="sTide"><option value="">물때 전체</option></select><input id="sMonth" type="month"><input class="full" id="sText" placeholder="전체 검색"></div><div class="row" style="margin-top:8px"><button class="btn light" onclick="clearSearch()">초기화</button><button class="btn" onclick="exportData()">백업</button></div></div><div id="entries"></div></section>
<section id="stats" class="screen"><div class="card"><h3>📊 통계</h3><div id="statsBox"></div></div></section><section id="pointsSec" class="screen"><div class="card"><h3>📍 포인트</h3><div id="pointsBox"></div></div></section></main>
<nav class="tab"><button class="on" onclick="go('write',this)">기록</button><button onclick="go('list',this)">목록</button><button onclick="go('stats',this)">통계</button><button onclick="go('pointsSec',this)">포인트</button></nav>
<datalist id="points"><option>주전항 앞</option><option>이득등대 앞</option><option>홍상도</option><option>정자항</option></datalist><datalist id="fishs"><option>농어</option><option>삼치</option><option>방어</option><option>참돔</option></datalist><datalist id="lures"><option>메탈</option><option>미노우</option><option>바이브</option></datalist>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script src="app.js"></script></body></html>
